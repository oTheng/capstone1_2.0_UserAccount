<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Accounting Ledger</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- ================= Sidebar ================= -->

    <aside class="sidebar">

        <div class="logo">

            <i class="fa-solid fa-wallet"></i>

            <h2>Ledger</h2>

        </div>

        <ul>

            <li id="dashboardMenu" class="active">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </li>

            <li id="transactionsMenu">
                <i class="fa-solid fa-list"></i>
                Transactions
            </li>

            <li id="reportsMenu">
                <i class="fa-solid fa-chart-column"></i>
                Reports
            </li>

            <li id="vendorsMenu">
                <i class="fa-solid fa-user-group"></i>
                Vendors
            </li>

            <li id="settingsMenu">
                <i class="fa-solid fa-gear"></i>
                Settings
            </li>

        </ul>

    </aside>

    <section id="dashboardPage">

        <!-- Cards -->

        <!-- Toolbar -->

        <!-- Transaction Table -->

    </section>

    <section id="reportsPage" style="display:none;">

        <h2>Reports</h2>

        <div id="reportContent"></div>

    </section>

    <section id="vendorsPage" style="display:none;">

        <h2>Vendors</h2>

        <div id="vendorContent"></div>

    </section>

    <section id="settingsPage" style="display:none;">

        <h2>Settings</h2>

        <div class="settings-card">

            <button id="exportCsvBtn">
                Export CSV
            </button>

            <button id="clearSearchBtn">
                Clear Search
            </button>

        </div>

    </section>

    <!-- ================= Main Content ================= -->

    <main>

        <!-- Header -->

        <header>

            <div>

                <h1>Accounting Ledger</h1>

                <p>Version 2.0</p>

            </div>

            <button id="refreshBtn">

                <i class="fa-solid fa-rotate"></i>

                Refresh

            </button>

        </header>

        <!-- Dashboard Cards -->

        <section class="cards">

            <div class="card deposits">

                <i class="fa-solid fa-circle-arrow-down"></i>

                <h3>Total Deposits</h3>

                <h2 id="deposits">$0.00</h2>

            </div>

            <div class="card payments">

                <i class="fa-solid fa-circle-arrow-up"></i>

                <h3>Total Payments</h3>

                <h2 id="payments">$0.00</h2>

            </div>

            <div class="card balance">

                <i class="fa-solid fa-dollar-sign"></i>

                <h3>Current Balance</h3>

                <h2 id="balance">$0.00</h2>

            </div>

            <div class="card total">

                <i class="fa-solid fa-receipt"></i>

                <h3>Transactions</h3>

                <h2 id="transactionCount">0</h2>

            </div>

        </section>

        <!-- Toolbar -->

        <section class="toolbar">

            <input
                    type="text"
                    id="searchBox"
                    placeholder="Search by vendor or description...">

            <button id="depositBtn">

                <i class="fa-solid fa-plus"></i>

                Add Deposit

            </button>

            <button id="paymentBtn">

                <i class="fa-solid fa-minus"></i>

                Add Payment

            </button>

        </section>

        <!-- Transactions Table -->

        <section class="table-section">

            <table>

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Date</th>

                    <th>Time</th>

                    <th>Description</th>

                    <th>Vendor</th>

                    <th>Amount</th>

                    <th>Type</th>

                    <th>Actions</th>

                </tr>

                </thead>

                <tbody id="transactionTable">

                </tbody>

            </table>

        </section>

    </main>

</div>

<!-- ================= Modal ================= -->

<div class="modal" id="transactionModal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <h2 id="modalTitle">New Transaction</h2>

        <form id="transactionForm">

            <label>Description</label>

            <input
                    id="description"
                    type="text"
                    required>

            <label>Vendor</label>

            <input
                    id="vendor"
                    type="text"
                    required>

            <label>Amount</label>

            <label>Payment Method</label>

            <select id="paymentMethod">

                <option value="Cash">Cash</option>

                <option value="Debit Card">Debit Card</option>

                <option value="Credit Card">Credit Card</option>

                <option value="Check">Check</option>

                <option value="Bank Transfer">Bank Transfer</option>

                <option value="Mobile Payment">Mobile Payment</option>

            </select>

            <input
                    id="amount"
                    type="number"
                    step="0.01"
                    required>

            <label>Type</label>

            <select id="transactionType">

                <option value="DEPOSIT">Deposit</option>

                <option value="PAYMENT">Payment</option>

            </select>

            <button
                    id="saveBtn"
                    type="submit">

                Save Transaction

            </button>

        </form>

    </div>

</div>

<script src="js/app.js"></script>

</body>

</html>
